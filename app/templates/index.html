<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sciences Trainer</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  color: #e2e2e2;
  margin: 0;
  padding: 0;
  max-width: 720px;
  margin: auto;

  background:
    linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.6)),
    url("/static/img/2023_Kianna.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* ================= NAVBAR ================= */
nav {
  position: sticky;
  top: 0;
  z-index: 1000;

  display: flex;
  gap: 16px;

  padding: 12px 16px;

  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

nav a {
  color: #6ec6ff;
  text-decoration: none;
  opacity: 0.8;
  font-size: 14px;
}

nav a.active {
  color: #ffd166;
  opacity: 1;
}

nav a:hover {
  opacity: 1;
}

/* ================= MAIN ================= */
.container {
  padding: 20px;
}

h1 {
  font-size: 22px;
  color: #ffd166;
  margin-bottom: 12px;
}

/* ================= FORM ================= */
form {
  display: grid;
  gap: 18px;

  background: rgba(15,15,15,0.9);
  padding: 18px;
  border-radius: 12px;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 20px 60px rgba(0,0,0,0.8);
}

label {
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 11px;
  background: #14161a;
  color: #e6e6e6;
  border: 1px solid #2a2e35;
  border-radius: 6px;
  font-family: inherit;
}

input:focus, select:focus {
  outline: none;
  border-color: #6ec6ff;
}

/* ================= BUTTON ================= */
button {
  margin-top: 8px;
  padding: 14px;
  font-size: 16px;
  background: #c20b0b;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #9e0909;
}

/* ================= BOX ================= */
.box {
  background: #111318;
  padding: 12px 14px;
  border-radius: 8px;
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {

  body {
    background-attachment: scroll;
  }

  form {
    padding: 14px;
  }

  button {
    font-size: 18px;
    padding: 16px;
  }

  input, select {
    font-size: 16px;
  }
}

.hidden { display: none; }

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/" class="active">Inicio</a>
  <a href="/admin">Admin</a>
</nav>

<div class="container">

<h1>Configurar sesión</h1>

<form method="post" action="/play/question">

  <!-- CATEGORÍA -->
  <div>
    <label>Categoría</label>
    <select id="categorySelect" required>
      <option value="">Selecciona categoría</option>
      {% for c in categories %}
        <option value="{{ c.id }}">{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- SUBCATEGORÍA -->
  <div>
    <label>Subcategoría</label>

    <!-- BUSCADOR -->
    <input
      type="text"
      id="subcategorySearch"
      placeholder="Primero selecciona categoría"
      disabled
    >

    <!-- DROPDOWN -->
    <select name="subcategory_id" id="subcategorySelect" required>
      <option value="">Selecciona subcategoría</option>
    </select>
  </div>

  <!-- TODO EL BANCO -->
  <div class="box" style="display:flex; justify-content:space-between; align-items:center;">
    <label style="display:flex; align-items:center; gap:10px; margin:0;">
      Usar todo el banco
      <input type="checkbox" id="allQuestions" name="all_questions" value="1">
    </label>
  </div>

  <!-- NÚMERO -->
  <div id="limitBlock">
    <label>Número de preguntas</label>
    <input type="number" id="limitInput" name="limit" value="20">
  </div>

  <!-- TIEMPO -->
  <div>
    <label>Tiempo (min)</label>
    <input type="number" name="time_limit" value="30">
  </div>

  <button>Empezar sesión</button>

</form>

</div>

<script>
/* ================= DATA ================= */
const categoryData = {{ categories_json | safe }};

const categorySelect = document.getElementById("categorySelect");
const subcategorySelect = document.getElementById("subcategorySelect");
const searchInput = document.getElementById("subcategorySearch");

let currentSubcategories = [];

/* ================= CATEGORY ================= */
categorySelect.addEventListener("change", () => {
  const id = categorySelect.value;

  subcategorySelect.innerHTML =
    '<option value="">Selecciona subcategoría</option>';

  currentSubcategories = categoryData[id] || [];

  currentSubcategories.forEach(s => {
    const o = document.createElement("option");
    o.value = s.id;
    o.textContent = s.name;
    subcategorySelect.appendChild(o);
  });

  searchInput.disabled = currentSubcategories.length === 0;
  searchInput.placeholder = currentSubcategories.length
    ? "Buscar subcategoría..."
    : "Primero selecciona categoría";

  searchInput.value = "";
});

/* ================= SEARCH ================= */
searchInput.addEventListener("input", () => {
  const query = searchInput.value.toLowerCase();

  subcategorySelect.innerHTML =
    '<option value="">Selecciona subcategoría</option>';

  currentSubcategories
    .filter(s => s.name.toLowerCase().includes(query))
    .forEach(s => {
      const o = document.createElement("option");
      o.value = s.id;
      o.textContent = s.name;
      subcategorySelect.appendChild(o);
    });
});

/* ================= ALL QUESTIONS ================= */
const allQuestions = document.getElementById("allQuestions");
const limitBlock = document.getElementById("limitBlock");

allQuestions.addEventListener("change", () => {
  limitBlock.classList.toggle("hidden", allQuestions.checked);
});
</script>

</body>
</html>
